<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALIDEEA - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a3c5e 0%, #0f2540 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .brand { font-size: 2rem; font-weight: 800; color: #1a3c5e; letter-spacing: 3px; text-align: center; margin-bottom: 8px; }
        .brand span { color: #e8a020; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.9rem; }
        .btn-login { background: #1a3c5e; color: white; width: 100%; padding: 12px; border-radius: 8px; font-weight: 600; border: none; }
        .btn-login:hover { background: #0f2540; color: white; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand">ALI<span>DEEA</span></div>
    <div class="subtitle">Sistem de gestionare inventar</div>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="POST">
        <div class="mb-3">
            <label class="form-label fw-semibold">Utilizator</label>
            <input type="text" name="username" class="form-control form-control-lg" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Parolă</label>
            <input type="password" name="password" class="form-control form-control-lg" required>
        </div>
        <button type="submit" class="btn-login btn">Intră în sistem</button>
    </form>
</div>
</body>
</html>
