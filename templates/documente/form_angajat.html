{% extends "base.html" %}
{% block title %}{{ 'Editeaza' if angajat else 'Angajat nou' }} - Documente{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-start">
    <h4><i class="bi bi-person-plus me-2 text-primary"></i>
        {{ 'Editeaza angajat' if angajat else 'Angajat nou' }}
    </h4>
    <a href="/documente/" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Inapoi
    </a>
</div>

<div class="card" style="max-width:480px">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nume complet <span class="text-danger">*</span></label>
                <input type="text" name="nume" class="form-control"
                       value="{{ angajat.nume if angajat else '' }}" required
                       placeholder="ex: Ionescu Maria">
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Locatie</label>
                <select name="locatie_id" class="form-select">
                    <option value="">— Fara locatie —</option>
                    {% for l in locatii %}
                    <option value="{{ l.id }}"
                        {{ 'selected' if angajat and angajat.locatie_id == l.id else '' }}>
                        {{ l.nume }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            {% if angajat %}
            <div class="mb-3 form-check">
                <input type="checkbox" name="activ" id="activ" class="form-check-input"
                       {{ 'checked' if angajat.activ else '' }}>
                <label class="form-check-label" for="activ">Angajat activ</label>
            </div>
            {% endif %}
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-check-lg me-1"></i>
                {{ 'Salveaza modificarile' if angajat else 'Adauga angajat' }}
            </button>
        </form>
    </div>
</div>
{% endblock %}
