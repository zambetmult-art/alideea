{% extends "base.html" %}
{% block title %}Intrare noua{% endblock %}
{% block content %}
<div class="page-header"><h4><i class="bi bi-arrow-down-circle me-2 text-primary"></i>Intrare stoc noua</h4></div>
<form method="POST" id="formIntrare">
    <input type="hidden" name="produse_json" id="produseJson">
    <div class="row g-3">
        <div class="col-12">
            <div class="card">
                <div class="card-header">Informatii generale</div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Data <span class="text-danger">*</span></label>
                            <input type="date" name="data" class="form-control" required
                                   value="{{ today }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Furnizor</label>
                            <select name="furnizor_id" class="form-select">
                                <option value="">-- Selecteaza furnizor --</option>
                                {% for f in furnizori %}
                                <option value="{{ f.id }}">{{ f.nume }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Nr. document / factura</label>
                            <input type="text" name="nr_document" class="form-control" placeholder="ex: FAC-2024-001">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Observatii</label>
                            <input type="text" name="observatii" class="form-control">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>Produse</span>
                    <button type="button" class="btn btn-sm btn-outline-primary" onclick="addProductRow(document.getElementById('produsePicker'), true)">
                        <i class="bi bi-plus-lg me-1"></i>Adauga produs
                    </button>
                </div>
                <div class="card-body">
                    <div id="produsePicker"></div>
                </div>
            </div>
        </div>
        <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Salveaza</button>
            <a href="/intrari/" class="btn btn-outline-secondary">Anuleaza</a>
        </div>
    </div>
</form>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('produsePicker');
    addProductRow(container, true);
    // Show price fields for intrari
    document.querySelectorAll('.pret-container').forEach(el => el.classList.remove('d-none'));

    document.getElementById('formIntrare').addEventListener('submit', function(e) {
        const produse = collectProducts('produsePicker', true);
        if (produse.length === 0) {
            e.preventDefault();
            alert('Adauga cel putin un produs!');
            return;
        }
        document.getElementById('produseJson').value = JSON.stringify(produse);
    });
});

// Override addProductRow to show price by default for intrari
const origAdd = addProductRow;
</script>
{% endblock %}
