<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>ALIDEEA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1a3c5e; --accent: #e8a020; }
        body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        .top-bar { background: var(--primary); color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
        .top-bar .brand { font-size: 1.4rem; font-weight: 800; letter-spacing: 2px; }
        .top-bar .brand span { color: var(--accent); }
        .content { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
        .btn-primary { background: var(--primary); border-color: var(--primary); padding: 14px; font-size: 1rem; font-weight: 600; }
        .btn-primary:hover { background: #0f2540; }
        .btn-accent { background: var(--accent); border-color: var(--accent); color: white; padding: 14px; font-size: 1rem; font-weight: 600; }
        .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; }
        .qty-input { font-size: 1.1rem; text-align: center; border-radius: 8px; padding: 12px; }
        .product-row { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; }
        .product-row:last-child { border-bottom: none; }
        .product-name { font-weight: 600; font-size: 1rem; color: #1a3c5e; }
        .product-unit { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
<div class="top-bar">
    <div class="brand">ALI<span>DEEA</span></div>
    {% block topright %}{% endblock %}
</div>
<div class="content">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
