{% extends "base_store.html" %}
{% block content %}
<div class="text-center mb-4 mt-2">
    <h4 class="fw-bold" style="color:#1a3c5e">Bun venit!</h4>
    <p class="text-muted">Selectează ce vrei să faci:</p>
</div>

<div class="row g-3 mb-4">
    <div class="col-6">
        <a href="{{ url_for('store_inventory') }}" class="btn btn-primary w-100 rounded-3" style="height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <i class="fas fa-clipboard-list fa-lg mb-1"></i>
            Inventar
        </a>
    </div>
    <div class="col-6">
        <a href="{{ url_for('store_order') }}" class="btn btn-accent w-100 rounded-3" style="height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <i class="fas fa-shopping-cart fa-lg mb-1"></i>
            Comandă
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <p class="text-muted small mb-0 text-center">
            <i class="fas fa-info-circle me-1"></i>
            Inventarul se completează în fiecare luni. Comenzile se trimit oricând.
        </p>
    </div>
</div>
{% endblock %}
