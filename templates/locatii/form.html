{% extends "base.html" %}
{% block title %}{{ 'Editeaza locatie' if locatie else 'Locatie noua' }}{% endblock %}
{% block content %}
<div class="page-header"><h4><i class="bi bi-geo-alt me-2 text-primary"></i>{{ 'Editeaza locatie' if locatie else 'Locatie noua' }}</h4></div>
<div class="card" style="max-width:500px">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nume locatie <span class="text-danger">*</span></label>
                <input type="text" name="nume" class="form-control" required value="{{ locatie.nume if locatie else '' }}" placeholder="ex: Carrefour Baneasa">
            </div>
            <div class="mb-3">
                <label class="form-label">Adresa</label>
                <input type="text" name="adresa" class="form-control" value="{{ locatie.adresa if locatie else '' }}">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Salveaza</button>
                <a href="/locatii/" class="btn btn-outline-secondary">Anuleaza</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
